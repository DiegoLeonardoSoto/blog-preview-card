<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />

        <title>Frontend Mentor | Blog preview card</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./assets/output.css" />
    </head>
    <body class="font-figtree">
        <main class="bg-primary-yellow h-screen grid place-content-center">
            <section
                class="bg-white w-80 md:w-96 flex flex-col p-6 gap-6 border-black border-2 rounded-2xl shadow-[7px_7px_0_rgba(0,0,0,1)] md:shadow-[10px_10px_0_rgba(0,0,0,1)]"
            >
                <img
                    class="rounded-xl"
                    src="./assets/images/illustration-article.svg"
                    alt="illustration article image"
                />

                <div class="flex flex-col gap-3 md:gap-4">
                    <span
                        class="text-sm md:text-base bg-primary-yellow font-bold px-4 py-1 self-start rounded-md"
                    >
                        Learning
                    </span>
                    <time class="font-medium text-gray950 text-sm md:text-base">
                        Published 21 Dec 2023
                    </time>
                    <h1
                        class="text-xl md:text-2xl font-extrabold hover:text-primary-yellow hover:cursor-pointer"
                    >
                        HTML & CSS foundations
                    </h1>

                    <p class="text-sm md:text-base text-gray500">
                        These languages are the backbone of every website,
                        defining structure, content, and presentation.
                    </p>

                    <div class="flex items-center gap-3">
                        <img
                            class="w-8"
                            src="./assets/images/image-avatar.webp"
                            alt="avatar image"
                        />
                        <span class="text-sm md:text-base font-black">
                            Greg Hooper
                        </span>
                    </div>
                </div>
            </section>
        </main>

        <footer
            class="attribution text-sm md:text-base absolute bottom-2 left-2"
        >
            Challenge by
            <a href="https://www.frontendmentor.io?ref=challenge"
                >Frontend Mentor</a
            >. Coded by
            <a
                class="text-blue-600 hover:cursor-pointer hover:underline"
                href="https://github.com/DiegoLeonardoSoto"
                target="_blank"
                >Diego Soto</a
            >.
        </footer>
    </body>
</html>
